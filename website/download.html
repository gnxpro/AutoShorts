<head>

<style>
body{

}
.btn{
display:inline-block;
padding:18px 36px;
background:#22c55e;

<body>

<h1>Download GNX Production</h1>
<p>Latest desktop installer for Windows</p>

<a class="btn" id="downloadBtn" href="https://github.com/gnxpro/AutoShorts/releases/download/v0.1/GNX_Production_v0.1.exe">

</a>

<script>

})
.catch(() => {});
</script>
