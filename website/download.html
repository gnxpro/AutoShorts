<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download | GNX Production</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Segoe UI;
text-align:center;
padding:100px 20px;
}

.container{
max-width:700px;
margin:auto;
}

.logo{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.logo span{
color:#ff4d4d;
}

.btn{
background:#ff4d4d;
color:white;
padding:16px 28px;
border-radius:10px;
text-decoration:none;
display:inline-block;
font-weight:bold;
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<span>GNX</span> Production
</div>

<h1>Download GNX Production</h1>

<p style="opacity:0.8;">
Latest desktop installer for Windows.
</p>

<a class="btn" id="downloadBtn" href="#">
Download Installer
</a>

<br><br>

<a href="index.html" style="color:white;opacity:0.7;">
← Back to Home
</a>

</div>

<script>

fetch("releases/version.json")
.then(res => res.json())
.then(data => {

const btn = document.getElementById("downloadBtn");

if(btn){
btn.href = data.download_url;
}

});

</script>

</body>
</html>
